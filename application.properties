# Server Configuration
server.port=8080
server.servlet.context-path=/
server.error.include-message=always
server.compression.enabled=true

# Database Configuration
spring.datasource.url=jdbc:h2:mem:expensedb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA Configuration
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# H2 Console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JWT Configuration
app.jwtSecret=expenseTrackerSecretKeyThatIsAtLeast32CharactersLongForHS512Algorithm
app.jwtExpirationMs=3600000
app.jwtRefreshExpirationMs=2592000000

# Logging
logging.level.root=INFO
logging.level.com.expensetracker=DEBUG
logging.level.org.springframework.security=DEBUG

# Jackson Configuration
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=UTC
spring.jackson.default-property-inclusion=non_null
